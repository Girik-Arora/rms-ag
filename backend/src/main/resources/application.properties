spring.application.name=rms-ag-backend

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8082}

# ─── Database (Supabase PostgreSQL) ───────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://db.cadhxapiyezdniemhbgn.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD:FILL_IN_YOUR_PASSWORD_HERE}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ─── Supabase JWT ─────────────────────────────────────────────────────────────
supabase.jwt.secret=Vs8H0dwXnMQKRObfyfhUfiPcPPap19p4m+nbpjVRkcB3ADXxWUi5FbUzSYUqm94OwnlUHtwCZOW24XxjKPe4dg==
supabase.project.url=https://cadhxapiyezdniemhbgn.supabase.co

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ─── Async Thread Pool ────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,https://rms-ag.vercel.app,https://*.vercel.app

# ─── SpringDoc (Swagger) ──────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Actuator (Railway health check) ────────────────────────────────────────
# NOTE: management.server.port must NOT be set — Railway health check hits the
# same port as the app. A separate management port breaks the /actuator/health check.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
